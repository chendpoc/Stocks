name: Daily Summary Publish

on:
  schedule:
    # 00:30 UTC = 08:30 Asia/Shanghai.
    - cron: "30 0 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Optional Beijing date to regenerate, formatted as YYYY-MM-DD"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: daily-summary-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      SUMMARY_SITE_BASE_URL: https://stocks-emw.pages.dev/
      SUMMARY_TARGET_DATE: ${{ github.event.inputs.date }}
      WHOP_HEADERS_JSON: ${{ secrets.WHOP_HEADERS_JSON }}
      MODEL_KEY_JSON: ${{ secrets.MODEL_KEY_JSON }}
      WEWORK_WEBHOOK_URL: ${{ secrets.WEWORK_WEBHOOK_URL }}
      SUMMARY_DEPLOY_HOOK_URL: ${{ secrets.SUMMARY_DEPLOY_HOOK_URL }}
      GIT_AUTHOR_NAME: github-actions[bot]
      GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
      GIT_COMMITTER_NAME: github-actions[bot]
      GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.5
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install CJK fonts for summary images
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          fc-cache -f -v

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Publish daily card and image
        run: pnpm run daily:publish
