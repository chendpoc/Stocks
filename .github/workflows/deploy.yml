name: Verify VitePress site

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy.yml"
      - "docs/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/deploy.yml"
      - "docs/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vitepress-verify
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_ALERT_WS_URL: ${{ secrets.ALERT_WS_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.5
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Write frontend .env
        run: |
          if [ -n "${VITE_ALERT_WS_URL}" ]; then
            echo "::add-mask::${VITE_ALERT_WS_URL}"
            echo "VITE_ALERT_WS_URL=${VITE_ALERT_WS_URL}" > .env
          else
            echo "VITE_ALERT_WS_URL is empty; skipping .env write"
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build with VitePress
        run: pnpm run docs:build
