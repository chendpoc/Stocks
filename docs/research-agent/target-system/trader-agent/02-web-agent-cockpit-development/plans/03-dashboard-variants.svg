  <text x="660" y="262" fill="#d29922" font-size="10">Invalidated: 3</text>
  <text x="770" y="262" fill="#3fb950" font-size="10">Data: Mock live</text>

  <!-- Focus Queue -->
  <rect x="564" y="286" width="384" height="340" rx="6" fill="none" stroke="#30363d" stroke-width="1"/>
  <text x="576" y="308" fill="#8b949e" font-size="10" font-weight="600">Today Focus Queue</text>

  <rect x="576" y="318" width="360" height="24" rx="0" fill="#21262d"/>
  <text x="584" y="334" fill="#8b949e" font-size="8">标的</text>
  <text x="640" y="334" fill="#8b949e" font-size="8">观点</text>
  <text x="810" y="334" fill="#8b949e" font-size="8">来源</text>
  <text x="870" y="334" fill="#8b949e" font-size="8">状态</text>

  <text x="584" y="358" fill="#c9d1d9" font-size="9" font-weight="600">NVDA</text>
  <text x="640" y="358" fill="#c9d1d9" font-size="9">财报前不追高</text>
  <text x="810" y="358" fill="#8b949e" font-size="8">admin</text>
