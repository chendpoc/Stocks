  <rect x="576" y="166" width="100" height="22" rx="4" fill="none" stroke="#3fb950" stroke-width="1" opacity="0.4"/>
  <text x="582" y="181" fill="#3fb950" font-size="9">Now · 指数缺口回补</text>
  <rect x="684" y="166" width="100" height="22" rx="4" fill="none" stroke="#3fb950" stroke-width="1" opacity="0.4"/>
  <text x="690" y="181" fill="#3fb950" font-size="9">Now · 资金高低切换</text>
  <rect x="576" y="194" width="100" height="22" rx="4" fill="none" stroke="#d29922" stroke-width="1" opacity="0.4"/>
  <text x="582" y="209" fill="#d29922" font-size="9">Wait · 等待前低确认</text>
  <rect x="684" y="194" width="100" height="22" rx="4" fill="none" stroke="#d29922" stroke-width="1" opacity="0.4"/>
  <text x="690" y="209" fill="#d29922" font-size="9">Wait · 不赌财报</text>

