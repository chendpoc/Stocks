  <text x="500" y="44" fill="#8b949e" font-size="11">问题：意图条挤在一行里，Gate 状态不够突出。Market Intent 才是用户决策的第一输入</text>

  <rect x="500" y="56" width="460" height="580" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>

